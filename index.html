<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espelho dos Arcanos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="intro">

    <div id="stars"></div>

    <div class="stars-circle">
      <span class="star white star-1">✦</span>

      <span class="star purple star-2">✧</span>

      <span class="star white star-3">✦</span>

      <span class="star purple star-4">✧</span>

      <span class="star white star-5">✦</span>

      <span class="star purple star-6">✧</span>

      <span class="star white star-7">✦</span>
      
      <span class="star purple star-8">✧</span>
    </div>

    <section class="hero-content">
      <h1 class="titulo-principal">Espelho dos Arcanos</h1>
      <p class="subtitulo">Inicie sua jornada rumo ao equilíbrio.</p>
    </section>


    <div class="button-area">
      <button class="start-button" id="introButton">Iniciar jornada</button>
    </div>

  </main>


     <section class="next-screen hidden" id="nextScreen">

      <div class="next-content">

        <h2 class="next-title">Antes de começar</h2>

        <p class="next-text">Respire fundo, silencie o ruído ao redor e concentre sua inteção. O espelho revela mais do que respostas: ele revela reflexos da sua própria jornada.</p>

        <div class="next-buttons">

          <button class="secondary-button" id="backButton">Voltar</button>

          <button class="start-button" id="continueButton">Prosseguir</button>

        </div>
      </div>
    </section>

  <script src="js/script.js"></script>
</body>
</html>
